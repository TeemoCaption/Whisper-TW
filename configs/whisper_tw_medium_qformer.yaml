data:
  root: data/zh-TW
  train_split: train
  dev_split: dev
  test_split: test
  tokenizer_text_splits: [train, dev, test, validated]
  sample_rate: 16000
  max_audio_seconds: 30.0

tokenizer:
  type: sentencepiece
  model_type: unigram
  vocab_size: 4000
  model_path: artifacts/tokenizer/spm_zh_tw_4k.model
  character_coverage: 0.9995
  pad_id: 0
  unk_id: 1
  bos_id: 2
  eos_id: 3

model:
  whisper_name: openai/whisper-medium
  freeze_whisper_encoder: true

  bopomofo_ctc:
    enabled: true
    loss_weight: 0.3

  assistant_encoder:
    num_layers: 2
    num_heads: 8
    hidden_size: 768
    dropout: 0.1

  qformer:
    enabled: true
    num_queries: 64
    num_layers: 4
    num_heads: 8
    hidden_size: 768
    dropout: 0.1

  decoder:
    output_type: plain_chinese_text
    num_layers: 4
    num_heads: 8
    hidden_size: 768
    dropout: 0.1
    max_target_length: 256

training:
  batch_size: 48
  eval_batch_size: 64
  learning_rate: 0.0001
  weight_decay: 0.01
  num_epochs: 50
  num_workers: 16
  prefetch_factor: 4
  pin_memory: true
  persistent_workers: true
  mixed_precision: true
  amp_dtype: auto
  allow_tf32: true
  cudnn_benchmark: true
  float32_matmul_precision: high
  log_every: 10
  output_dir: artifacts/checkpoints
  device: cuda
  early_stopping:
    enabled: true
    patience: 5
    min_delta: 0.001

wandb:
  enabled: true
  project: Whisper-TW
  name: whisper-medium-qformer-spm4k
  mode: online
  console: redirect

generation:
  max_new_tokens: 128
